name: desktop-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    name: build-desktop (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            runner: macos-latest
            rust_targets: aarch64-apple-darwin
            bundle_args: --bundles app,dmg --target aarch64-apple-darwin
          - name: macos-x64
            runner: macos-latest
            rust_targets: x86_64-apple-darwin
            bundle_args: --bundles app,dmg --target x86_64-apple-darwin
          - name: linux-x64
            runner: ubuntu-22.04
            rust_targets: ""
            bundle_args: --bundles deb,appimage,rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable targets
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          short_sha="${GITHUB_SHA::12}"
          echo "main_tag=main-build-${version}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "main_name=PRAW main build ${version} (${short_sha})" >> "$GITHUB_OUTPUT"
          {
            echo "main_body<<EOF"
            echo "这是从 \`main\` 自动产出的桌面端预发布版本。"
            echo
            echo "欢迎下载体验。当前版本已经同时附带："
            echo
            echo "- macOS 安装包（\`.dmg\`）"
            echo "- macOS 应用归档（\`.app.tar.gz\`）"
            echo "- Linux 安装包（\`.deb\` / \`.rpm\` / \`.AppImage\`）"
            echo
            echo "### 作者的话"
            echo
            echo "- 这是一个持续快速迭代中的版本，适合想提前体验新能力的用户"
            echo "- 如果你主要关注终端交互、Dialog 体验、AI 辅助命令流，这个版本已经可以上手"
            echo "- 如果你在 macOS 或 Linux 上遇到安装、启动、交互兼容问题，欢迎继续反馈"
            echo
            echo "### 本次构建"
            echo
            echo "- Version: ${version}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Release tag: main-build-${version}-${short_sha}"
            echo
            echo "### 当前方向"
            echo
            echo "- 继续完善 shell 兼容能力，尤其是 zsh / interactive 场景"
            echo "- 持续打磨 Dialog 模式和 Classic 模式的体验边界"
            echo "- 稳定跨平台打包与发布质量"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "tag_body<<EOF"
            echo "这是 PRAW 的自动化桌面端版本发布。"
            echo
            echo "### 作者的话"
            echo
            echo "- 这一版聚合了 macOS 与 Linux 的桌面端安装资产"
            echo "- 欢迎直接下载使用，也欢迎继续反馈产品体验与兼容性问题"
            echo
            echo "### 发布资产"
            echo
            echo "- macOS: \`.dmg\`, \`.app.tar.gz\`"
            echo "- Linux: \`.deb\`, \`.rpm\`, \`.AppImage\`"
            echo
            echo "### 构建信息"
            echo
            echo "- Version: ${version}"
            echo "- Source ref: ${GITHUB_REF}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build workflow artifacts only
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.bundle_args }}

      - name: Build and publish main-branch prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release_meta.outputs.main_tag }}
          releaseName: ${{ steps.release_meta.outputs.main_name }}
          releaseBody: ${{ steps.release_meta.outputs.main_body }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.bundle_args }}

      - name: Build and publish tagged release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: PRAW ${{ github.ref_name }}
          releaseBody: ${{ steps.release_meta.outputs.tag_body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.bundle_args }}
