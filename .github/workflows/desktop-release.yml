name: desktop-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    name: build-desktop (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            runner: macos-latest
            rust_targets: aarch64-apple-darwin
            bundle_args: --bundles app,dmg --target aarch64-apple-darwin
          - name: macos-x64
            runner: macos-latest
            rust_targets: x86_64-apple-darwin
            bundle_args: --bundles app,dmg --target x86_64-apple-darwin
          - name: linux-x64
            runner: ubuntu-22.04
            rust_targets: ""
            bundle_args: --bundles deb,appimage,rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable targets
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libasound2-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple Developer ID certificate
        id: apple_signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${APPLE_CERTIFICATE}" || -z "${APPLE_CERTIFICATE_PASSWORD}" || -z "${KEYCHAIN_PASSWORD}" ]]; then
            echo "No Apple signing certificate configured; keeping ad-hoc signing identity"
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/apple-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/praw-signing.keychain-db"

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep 'Developer ID Application' | head -n 1 | sed -E 's/.*"(.+)"/\1/')"

          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "Unable to find a Developer ID Application signing identity in imported certificate"
            exit 1
          fi

          echo "signing_identity=$SIGNING_IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          short_sha="${GITHUB_SHA::12}"
          macos_guide_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${GITHUB_SHA}/docs/installing-macos.md"
          echo "main_tag=main-build-${version}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "main_name=PRAW main build ${version} (${short_sha})" >> "$GITHUB_OUTPUT"
          {
            echo "main_body<<EOF"
            echo "这是从 \`main\` 自动产出的桌面端预发布版本。"
            echo
            echo "欢迎下载体验。当前版本已经同时附带："
            echo
            echo "- macOS 安装包（\`.dmg\`）"
            echo "- macOS 应用归档（\`.app.tar.gz\`）"
            echo "- Linux 安装包（\`.deb\` / \`.rpm\` / \`.AppImage\`）"
            echo
            echo "### macOS 安装（预览版）"
            echo
            echo "- Apple Silicon Mac 请优先下载 aarch64 / arm64 资产"
            echo "- Intel Mac 请优先下载 x64 / x86_64 资产"
            echo "- 大多数用户直接使用 \`.dmg\` 即可，\`.app.tar.gz\` 更适合手动解包或排障"
            echo "- 如果首次打开时被 Gatekeeper 拦住，请按系统提示执行“右键打开”或前往“隐私与安全性”点击“仍要打开”"
            echo "- 详细图文步骤：${macos_guide_url}"
            echo
            echo "### 作者的话"
            echo
            echo "- 这是一个持续快速迭代中的版本，适合想提前体验新能力的用户"
            echo "- 如果你主要关注终端交互、Dialog 体验、AI 辅助命令流，这个版本已经可以上手"
            echo "- 如果你在 macOS 或 Linux 上遇到安装、启动、交互兼容问题，欢迎继续反馈"
            echo
            echo "### 本次构建"
            echo
            echo "- Version: ${version}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Release tag: main-build-${version}-${short_sha}"
            echo
            echo "### 当前方向"
            echo
            echo "- 继续完善 shell 兼容能力，尤其是 zsh / interactive 场景"
            echo "- 持续打磨 Dialog 模式和 Classic 模式的体验边界"
            echo "- 稳定跨平台打包与发布质量"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "tag_body<<EOF"
            echo "这是 PRAW 的正式版发布草稿。"
            echo
            echo "### 作者的话"
            echo
            echo "- 这一版已经自动聚合了 macOS 与 Linux 的桌面端安装资产"
            echo "- 如果 Apple Developer 签名/公证凭据缺失，macOS 资产会以未签名 / 未公证形式附带"
            echo "- 遇到 Gatekeeper 拦截时，请按系统提示执行“右键打开”或前往“隐私与安全性”点击“仍要打开”"
            echo "- 请作者在发布前补充本版本亮点、变更说明、已知问题和升级建议"
            echo "- 确认文案无误后，再从 GitHub Release 页面手动点击 Publish release"
            echo
            echo "### 发布资产"
            echo
            echo "- macOS: \`.dmg\`, \`.app.tar.gz\`"
            echo "- Linux: \`.deb\`, \`.rpm\`, \`.AppImage\`"
            echo
            echo "### 构建信息"
            echo
            echo "- Version: ${version}"
            echo "- Source ref: ${GITHUB_REF}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve signing mode
        id: release_signing
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SIGNING_IDENTITY: ${{ steps.apple_signing.outputs.signing_identity }}
        run: |
          if [[ -n "${APPLE_ID}" && -n "${APPLE_PASSWORD}" && -n "${APPLE_TEAM_ID}" && -n "${SIGNING_IDENTITY}" ]]; then
            echo "can_notarize=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_notarize=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build workflow artifacts only
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple_signing.outputs.signing_identity || '-' }}
        with:
          args: ${{ matrix.bundle_args }}

      - name: Build and publish main-branch prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.release_signing.outputs.can_notarize == 'true'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple_signing.outputs.signing_identity || '-' }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        with:
          tagName: ${{ steps.release_meta.outputs.main_tag }}
          releaseName: ${{ steps.release_meta.outputs.main_name }}
          releaseBody: ${{ steps.release_meta.outputs.main_body }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.bundle_args }}

      - name: Build and publish main-branch prerelease without notarization
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.release_signing.outputs.can_notarize != 'true'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple_signing.outputs.signing_identity || '-' }}
        with:
          tagName: ${{ steps.release_meta.outputs.main_tag }}
          releaseName: ${{ steps.release_meta.outputs.main_name }}
          releaseBody: ${{ steps.release_meta.outputs.main_body }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.bundle_args }}

      - name: Build and publish tagged release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.release_signing.outputs.can_notarize == 'true'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple_signing.outputs.signing_identity || '-' }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: PRAW ${{ github.ref_name }}
          releaseBody: ${{ steps.release_meta.outputs.tag_body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.bundle_args }}

      - name: Build and publish tagged release without notarization
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.release_signing.outputs.can_notarize != 'true'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple_signing.outputs.signing_identity || '-' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: PRAW ${{ github.ref_name }}
          releaseBody: ${{ steps.release_meta.outputs.tag_body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.bundle_args }}
