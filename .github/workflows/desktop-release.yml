name: desktop-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    name: build-desktop (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            runner: macos-latest
            rust_targets: aarch64-apple-darwin
            bundle_args: --bundles app,dmg --target aarch64-apple-darwin
          - name: macos-x64
            runner: macos-latest
            rust_targets: x86_64-apple-darwin
            bundle_args: --bundles app,dmg --target x86_64-apple-darwin
          - name: linux-x64
            runner: ubuntu-22.04
            rust_targets: ""
            bundle_args: --bundles deb,appimage,rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable targets
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          short_sha="${GITHUB_SHA::12}"
          echo "main_tag=main-build-${version}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "main_name=PRAW main build ${version} (${short_sha})" >> "$GITHUB_OUTPUT"

      - name: Build workflow artifacts only
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.bundle_args }}

      - name: Build and publish main-branch prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release_meta.outputs.main_tag }}
          releaseName: ${{ steps.release_meta.outputs.main_name }}
          releaseBody: |
            Automated desktop prerelease built from `main`.

            Commit: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.bundle_args }}

      - name: Build and publish tagged release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: PRAW ${{ github.ref_name }}
          releaseBody: Automated desktop release artifacts for PRAW.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.bundle_args }}
